<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent-World · 旅行出行 Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --pri:#3a76ed;--pri-d:#2a5ccc;--pri-l:#5b8ff9;
  --bg:#f7f8fa;--surf:#fff;--border:#e8ecf1;--border-l:#f0f2f5;
  --text:#1a1f2e;--text2:#5a6275;--text3:#9ca3b5;
  --think-bg:#f6f4ff;--think-bd:#ddd6fe;--think-tx:#6d28d9;--think-bar:#8b5cf6;
  --tool-bg:#fefce8;--tool-bd:#fde68a;--tool-tx:#92400e;
  --ans-bg:#ecfdf5;--ans-bd:#6ee7b7;--ans-tx:#065f46;
  --r:16px;--r-sm:10px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 0 0 1px rgba(0,0,0,.03);
}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ===== Header ===== */
#header{background:var(--surf);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.h-logo{width:30px;height:30px;border-radius:8px;overflow:hidden;flex-shrink:0}
.h-logo img{width:100%;height:100%;object-fit:cover}
.h-title{font-size:14px;font-weight:600;color:var(--text)}
.h-title span{color:var(--text3);font-weight:400;font-size:13px}
.h-right{margin-left:auto;display:flex;gap:6px}
.h-right button{border:1px solid var(--border);background:var(--surf);color:var(--text2);padding:5px 12px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:500;font-family:inherit;transition:all .15s}
.h-right button:hover{border-color:var(--pri);color:var(--pri)}
.h-right button:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}

/* ===== Chat ===== */
#chat-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column}
#chat{flex:1;overflow-y:auto;padding:16px 0 12px;scroll-behavior:smooth}
#chat::-webkit-scrollbar{width:4px}
#chat::-webkit-scrollbar-thumb{background:#d0d5dd;border-radius:2px}

/* ===== Message ===== */
.msg{max-width:820px;margin:0 auto;padding:0 20px;animation:fadeUp .3s ease}
.msg+.msg{margin-top:6px}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

.msg-row{display:flex;gap:8px;align-items:flex-start}
.msg.user .msg-row{flex-direction:row-reverse}

/* Avatar */
.av{width:28px;height:28px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover}
.av.av-user{background:var(--pri);color:#fff}
.av.av-agent{background:#fff;border:1px solid var(--border);box-shadow:0 1px 2px rgba(0,0,0,.04)}
.av.av-env{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1px solid #fcd34d}
.av.av-env svg{width:14px;height:14px;color:#92400e}

/* Role label */
.role{font-size:11px;font-weight:500;color:var(--text3);margin-bottom:2px;display:flex;align-items:center;gap:5px;line-height:1}
.msg.user .role{justify-content:flex-end}
.role .tag{font-size:9px;font-weight:600;padding:1px 5px;border-radius:4px;letter-spacing:.03em}
.tag-agent{background:#eef2ff;color:var(--pri)}
.tag-env{background:#fef9e7;color:#b45309}

/* Bubble */
.bub{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}

/* ===== Content Boxes ===== */
.user-box{background:var(--pri);color:#fff;border-radius:var(--r) var(--r) 4px var(--r);padding:10px 14px;font-size:13px;line-height:1.65;max-width:85%;box-shadow:0 1px 3px rgba(58,118,237,.18)}
.msg.user .bub{align-items:flex-end}

.think-wrap{display:flex;gap:0;align-items:stretch}
.think-gutter{width:2.5px;background:linear-gradient(180deg,var(--think-bar),#c4b5fd);border-radius:2px;flex-shrink:0;margin-right:10px}
.think-box{background:var(--think-bg);border:1px solid var(--think-bd);border-radius:var(--r-sm);padding:8px 12px;font-size:12px;color:var(--think-tx);line-height:1.65;flex:1}
.think-hd{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:#7c3aed;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.think-hd svg{width:11px;height:11px}

.fn-box{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text);white-space:pre-wrap;word-break:break-all;box-shadow:var(--shadow)}
.fn-hd{display:flex;align-items:center;gap:4px;font-family:'Inter',sans-serif;font-size:10px;font-weight:600;color:var(--pri);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.fn-hd svg{width:11px;height:11px}

.tool-box{background:var(--tool-bg);border:1px solid var(--tool-bd);border-radius:var(--r-sm);padding:8px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tool-tx);white-space:pre-wrap;word-break:break-all;line-height:1.55;max-height:200px;overflow-y:auto}
.tool-hd{display:flex;align-items:center;gap:4px;font-family:'Inter',sans-serif;font-size:10px;font-weight:600;color:#b45309;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.tool-hd svg{width:11px;height:11px}

.ans-box{background:var(--ans-bg);border:1.5px solid var(--ans-bd);border-radius:var(--r);padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ans-tx);white-space:pre-wrap;box-shadow:0 2px 6px rgba(52,211,153,.08)}
.ans-hd{display:flex;align-items:center;gap:4px;font-family:'Inter',sans-serif;font-size:10px;font-weight:700;color:#059669;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.ans-hd svg{width:12px;height:12px}

/* Cursor */
.cur{display:inline-block;width:2px;height:13px;background:currentColor;animation:bk .55s step-end infinite;vertical-align:text-bottom;margin-left:1px;border-radius:1px;opacity:.5}
@keyframes bk{0%,100%{opacity:.5}50%{opacity:0}}

/* ===== Input Bar ===== */
#input-bar{background:var(--surf);border-top:1px solid var(--border);padding:10px 20px 12px;flex-shrink:0}
.inp-wrap{max-width:820px;margin:0 auto;display:flex;gap:8px;align-items:flex-end}
#inp{flex:1;border:1px solid var(--border);border-radius:var(--r-sm);padding:9px 12px;font-family:'Inter',sans-serif;font-size:13px;color:var(--text);background:var(--surf);resize:none;min-height:38px;max-height:100px;line-height:1.55;outline:none;transition:border-color .15s}
#inp:focus{border-color:var(--pri)}
#inp::placeholder{color:var(--text3)}
#inp:disabled{background:#fafafa;color:var(--text2)}
#btn-send{width:36px;height:36px;border-radius:9px;border:none;background:var(--pri);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
#btn-send:hover{background:var(--pri-d);transform:scale(1.03)}
#btn-send:disabled{opacity:.25;cursor:not-allowed;transform:none}
#btn-send svg{width:16px;height:16px}
.inp-hint{max-width:820px;margin:3px auto 0;font-size:10px;color:var(--text3)}

/* ===== Status ===== */
#status{background:var(--surf);border-top:1px solid var(--border-l);padding:5px 20px;display:flex;align-items:center;gap:7px;font-size:10px;color:var(--text3);flex-shrink:0}
.dot{width:5px;height:5px;border-radius:50%;background:#22c55e;animation:pulse 1.4s infinite}
.dot.off{background:#d0d5dd;animation:none}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.3)}70%{box-shadow:0 0 0 3px rgba(34,197,94,0)}}
#prog{margin-left:auto;display:flex;align-items:center;gap:5px}
#pbar{width:100px;height:2.5px;background:var(--border-l);border-radius:2px;overflow:hidden}
#pfill{height:100%;background:linear-gradient(90deg,var(--pri),#38bdf8);border-radius:2px;transition:width .3s;width:0}
</style>
</head>
<body>

<div id="header">
  <div class="h-logo"><img src="../logo.png" alt="AW"></div>
  <div class="h-title">Agent-World <span>&middot; 旅行出行</span></div>
  <div class="h-right">
    <button id="btn-p" onclick="togglePause()" disabled>⏸ 暂停</button>
    <button onclick="resetDemo()">↻ 重置</button>
  </div>
</div>

<div id="chat-wrap"><div id="chat"></div></div>

<div id="input-bar">
  <div class="inp-wrap">
    <textarea id="inp" rows="1" placeholder="输入消息…" readonly></textarea>
    <button id="btn-send" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="inp-hint">自动演示模式 · 消息流式输入 &amp; 输出</div>
</div>

<div id="status">
  <div class="dot off" id="dot"></div>
  <span id="stxt">就绪</span>
  <div id="prog"><span id="scnt">0/0</span><div id="pbar"><div id="pfill"></div></div></div>
</div>

<script>
const ICO={
  think:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>',
  fn:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>',
  tool:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>'
};

const LOGO='../logo.png';

const MESSAGES=[
  {role:"user",content:`我在笔记系统里有一个页面列表，请先以列表里出现的第一个页面标题为准，去同一个数据库里检索是否还存在"同名页面"。然后再结合我提供的那个"带有嵌套待办事项的段落块"和"同一个段落块的纯段落版本"，帮我做一个一致性与风险评估：

规则：
• 如果数据库里找不到同名页面，则记为"缺失"
• 如果嵌套段落块里存在任何未勾选的待办，则记为"有未完成事项"
• 如果纯段落版本显示该段落块没有子内容，但嵌套版本却有子内容，则记为"一致性异常"

权重：缺失=50分，有未完成事项=30分，一致性异常=20分
结论：总分≥50 输出"高风险"，否则输出"低风险"

输出一个 JSON 对象，包含：
- page_title：用于检索的页面标题
- db_same_name_count：数据库中同名页面数量
- risk_score：风险分
- risk_level："高风险" 或 "低风险"`},
  {role:"assistant",
   think:`我现在需要处理用户的请求，首先理清步骤：

1. 获取页面列表中第一个页面的标题
2. 去数据库里检索同名页面的数量
3. 结合嵌套待办段落块和纯段落版本，做一致性和风险评估
4. 计算风险分和等级，输出 JSON

第一步：调用 get_example_page，获取页面标题。`,
   fnCall:'[{"name":"get_example_page","parameters":{}}]'},
  {role:"tool",toolName:"get_example_page",
   content:`{
  "object": "page",
  "id": "59833787-2cf9-4fdf-8782-e53db20768a5",
  "properties": {
    "Name": {
      "type": "title",
      "title": [{"text": {"content": "Tuscan kale"}, "plain_text": "Tuscan kale"}]
    },
    "Food group": {"select": {"name": "🥬 Vegetable"}},
    "Price": {"number": 2.5},
    "In stock": {"checkbox": true}
  }
}`},
  {role:"assistant",
   think:`提取到页面标题：Name → "Tuscan kale"

接下来用 query_example_database 查找同名页面。`,
   fnCall:'[{"name":"query_example_database","parameters":{"property_name":"Name","value":"Tuscan kale"}}]'},
  {role:"tool",toolName:"query_example_database",content:"[]"},
  {role:"assistant",
   think:`返回空数组 → 数据库中无同名页面，db_same_name_count = 0
按规则记为"缺失"，+50 分。

继续获取嵌套待办块，检查未完成事项。`,
   fnCall:'[{"name":"get_example_block_todo_nested","parameters":{}}]'},
  {role:"tool",toolName:"get_example_block_todo_nested",
   content:`{
  "object": "block",
  "type": "paragraph",
  "has_children": true,
  "paragraph": {
    "children": [{
      "type": "to_do",
      "has_children": false,
      "to_do": {"checked": false}
    }]
  }
}`},
  {role:"assistant",
   think:`嵌套块中 to_do.checked = false → 存在未完成事项，+30 分。

最后获取纯段落版本，对比一致性。`,
   fnCall:'[{"name":"get_example_block_paragraph","parameters":{}}]'},
  {role:"tool",toolName:"get_example_block_paragraph",
   content:`{
  "object": "block",
  "type": "paragraph",
  "has_children": false,
  "paragraph": {"text": []}
}`},
  {role:"assistant",
   think:`对比两个段落块：
• 嵌套版本：has_children = true（有子内容）
• 纯段落版本：has_children = false（无子内容）

→ 一致性异常，+20 分

风险分计算：
  缺失：50 分
  有未完成事项：30 分
  一致性异常：20 分
  总分 = 100 分 ≥ 50 → "高风险"`,
   finalAnswer:`{
  "page_title": "Tuscan kale",
  "db_same_name_count": 0,
  "risk_score": 100,
  "risk_level": "高风险"
}`}
];

const N=MESSAGES.length;
let ci=0,paused=false,running=false,tid=null;
const $=id=>document.getElementById(id);
const inp=$('inp');

function upProg(){$('scnt').textContent=ci+'/'+N;$('pfill').style.width=(ci/N*100)+'%'}
function setSt(t,on){$('stxt').textContent=t;$('dot').className=on?'dot':'dot off'}
function sleep(ms){return new Promise(r=>{tid=setTimeout(r,ms)})}
function waitR(){return new Promise(r=>{const c=setInterval(()=>{if(!paused){clearInterval(c);r()}},80)})}
function scroll(){$('chat').scrollTop=$('chat').scrollHeight}

async function typeText(el,text,spd){
  const c=document.createElement('span');c.className='cur';el.appendChild(c);
  let i=0;
  while(i<text.length){
    if(paused) await waitR();
    const ch=text.slice(i,i+3);
    c.insertAdjacentText('beforebegin',ch);
    i+=3;scroll();
    await sleep(spd);
  }
  c.remove();
}

async function typeInp(text,spd){
  inp.value='';inp.focus();
  let i=0;
  while(i<text.length){
    if(paused) await waitR();
    inp.value+=text.slice(i,i+2);
    inp.scrollTop=inp.scrollHeight;
    inp.style.height='auto';
    inp.style.height=Math.min(inp.scrollHeight,100)+'px';
    i+=2;
    await sleep(spd);
  }
  await sleep(400);
}

function mkMsg(role,toolName){
  const d=document.createElement('div');
  d.className='msg'+(role==='user'?' user':'');
  let av,rl;
  if(role==='user'){
    av='<div class="av av-user">U</div>';
    rl='You';
  } else if(role==='assistant'){
    av='<div class="av av-agent"><img src="'+LOGO+'" alt="AW"></div>';
    rl='Agent-World <span class="tag tag-agent">Agent</span>';
  } else {
    av='<div class="av av-env">'+ICO.tool+'</div>';
    const fn=toolName?' · '+toolName:'';
    rl='Environments'+fn+' <span class="tag tag-env">Tool</span>';
  }
  d.innerHTML='<div class="msg-row">'+av+'<div class="bub"><div class="role">'+rl+'</div><div class="cw"></div></div></div>';
  $('chat').appendChild(d);scroll();
  return d.querySelector('.cw');
}

async function renderMsg(m){
  if(paused) await waitR();

  if(m.role==='user'){
    setSt('用户输入中…',true);
    await typeInp(m.content,3);
    // flash send button
    $('btn-send').style.opacity='1';
    await sleep(250);
    inp.value='';inp.style.height='auto';
    $('btn-send').style.opacity='';
    await sleep(150);
    const w=mkMsg('user');
    const b=document.createElement('div');b.className='user-box';w.appendChild(b);
    await typeText(b,m.content,3);
    await sleep(800);
  }
  else if(m.role==='tool'){
    setSt('Environments 返回…',true);
    const w=mkMsg('tool',m.toolName);
    const b=document.createElement('div');b.className='tool-box';
    b.innerHTML='<div class="tool-hd">'+ICO.tool+' Tool Result</div>';
    w.appendChild(b);
    const s=document.createElement('span');b.appendChild(s);
    await typeText(s,m.content,6);
    await sleep(600);
  }
  else if(m.role==='assistant'){
    const w=mkMsg('assistant');

    if(m.think){
      setSt('Agent-World 思考中…',true);
      const tw=document.createElement('div');tw.className='think-wrap';
      tw.innerHTML='<div class="think-gutter"></div>';
      const tb=document.createElement('div');tb.className='think-box';
      tb.innerHTML='<div class="think-hd">'+ICO.think+' Thinking</div>';
      tw.appendChild(tb);w.appendChild(tw);
      await typeText(tb,m.think,6);
      await sleep(500);
    }

    if(m.fnCall){
      setSt('Agent-World 调用工具…',true);
      const fb=document.createElement('div');fb.className='fn-box';
      fb.innerHTML='<div class="fn-hd">'+ICO.fn+' Function Call</div>';
      w.appendChild(fb);
      const parsed=JSON.parse(m.fnCall);
      const pretty=JSON.stringify(parsed,null,2);
      await typeText(fb,pretty,8);
      await sleep(800);
    }

    if(m.finalAnswer){
      setSt('Agent-World 输出结果…',true);
      const ab=document.createElement('div');ab.className='ans-box';
      ab.innerHTML='<div class="ans-hd">'+ICO.check+' Final Answer</div>';
      w.appendChild(ab);
      await typeText(ab,m.finalAnswer,10);
      await sleep(600);
    }
  }
  ci++;upProg();
}

async function startDemo(){
  if(running)return;running=true;paused=false;
  $('btn-p').disabled=false;upProg();
  for(;ci<N;){
    await renderMsg(MESSAGES[ci]);
    if(ci<N) await sleep(600);
  }
  setSt('演示完成',false);running=false;$('btn-p').disabled=true;
}

function togglePause(){
  paused=!paused;
  $('btn-p').textContent=paused?'▶ 继续':'⏸ 暂停';
  setSt(paused?'已暂停':'运行中…',!paused);
}

function resetDemo(){
  if(tid)clearTimeout(tid);
  running=false;paused=false;ci=0;
  $('chat').innerHTML='';$('btn-p').disabled=true;$('btn-p').textContent='⏸ 暂停';
  inp.value='';inp.style.height='auto';upProg();setSt('就绪',false);
}

upProg();setTimeout(()=>startDemo(),600);
</script>
</body>
</html>
